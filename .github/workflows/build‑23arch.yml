name: build-23arch

permissions:
  contents: write

on:
  push:
    branches: [ main ]

env:
  BINARY_NAME: po2lmo
  ZIG_VERSION: 0.11.0

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build-essential
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build
        run: |
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64
          path: dist/${{ env.BINARY_NAME }}-linux-x86_64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-i386:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install i386 cross compiler
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Build
        run: |
          make clean
          make CC="gcc -m32"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-i386

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386
          path: dist/${{ env.BINARY_NAME }}-linux-i386
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armv7:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install armv7 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7
          path: dist/${{ env.BINARY_NAME }}-linux-armv7
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armhf:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install armhf cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf
          path: dist/${{ env.BINARY_NAME }}-linux-armhf
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aarch64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=aarch64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64
          path: dist/${{ env.BINARY_NAME }}-linux-aarch64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-riscv64:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install riscv64 toolchain
        run: |
          apt-get update -o Acquire::Retries=10
          apt-get install -y \
            build-essential \
            gcc \
            make \
            gcc-riscv64-linux-gnu \
            binutils-riscv64-linux-gnu

      - name: Build po2lmo (riscv64)
        run: |
          make clean
          make -j"$(nproc)" CC=riscv64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-riscv64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-riscv64
          path: dist/${{ env.BINARY_NAME }}-linux-riscv64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-powerpc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install powerpc cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=powerpc-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc
          path: dist/${{ env.BINARY_NAME }}-linux-powerpc
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-powerpc64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install powerpc64 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-powerpc64-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=powerpc64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc64
          path: dist/${{ env.BINARY_NAME }}-linux-powerpc64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-s390x:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install s390x cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-s390x-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=s390x-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-s390x

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-s390x
          path: dist/${{ env.BINARY_NAME }}-linux-s390x
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  # ---- musl (Zig) ----

  linux-x86_64-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (x86_64-musl)
        run: |
          make clean
          make CC="zig cc -target x86_64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64-musl
          path: dist/${{ env.BINARY_NAME }}-linux-x86_64-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armhf-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (armhf-musl)
        run: |
          make clean
          make CC="zig cc -target arm-linux-musleabihf"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf-musl
          path: dist/${{ env.BINARY_NAME }}-linux-armhf-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-aarch64-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (aarch64-musl)
        run: |
          make clean
          make CC="zig cc -target aarch64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64-musl
          path: dist/${{ env.BINARY_NAME }}-linux-aarch64-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  # ---- macOS ----

  macos-universal:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-universal
          path: dist/${{ env.BINARY_NAME }}-macos-universal
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  # ---- Windows ----

  windows-x86_64:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (x86_64)
        shell: bash
        run: |
          make clean
          make CC="clang -target x86_64-w64-mingw32"
          mkdir -p dist
          cp po2lmo.exe dist/${BINARY_NAME}-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-x86_64
          path: dist/${{ env.BINARY_NAME }}-windows-x86_64.exe
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          
  windows-i386:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 + MinGW i686
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: MINGW32
          install: >-
            mingw-w64-i686-gcc
            make

      - name: Build (i386)
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW32
        run: |
          make clean
          make CC=i686-w64-mingw32-gcc
          mkdir -p dist
          cp po2lmo.exe dist/${BINARY_NAME}-windows-i386.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-i386
          path: dist/${{ env.BINARY_NAME }}-windows-i386.exe
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  # ============================
  # loongarch64 (Debian sid 容器)
  # ============================
  linux-loongarch64:
    runs-on: ubuntu-latest
    container:
      image: debian:sid

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools + loongarch64 toolchain
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            gcc \
            make \
            gcc-loongarch64-linux-gnu \
            binutils-loongarch64-linux-gnu

      - name: Build po2lmo (loongarch64)
        run: |
          make clean
          make CC=loongarch64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-loongarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-loongarch64
          path: dist/${{ env.BINARY_NAME }}-linux-loongarch64

  # ============================
  # armv6
  # ============================
  linux-armv6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi

      - name: Build po2lmo (armv6)
        run: |
          make clean
          make CC=arm-linux-gnueabi-gcc CFLAGS="-O2 -march=armv6"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv6

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv6
          path: dist/${{ env.BINARY_NAME }}-linux-armv6

  # ============================
  # armv5
  # ============================
  linux-armv5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi

      - name: Build po2lmo (armv5)
        run: |
          make clean
          make CC=arm-linux-gnueabi-gcc CFLAGS="-O2 -march=armv5te"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv5
          path: dist/${{ env.BINARY_NAME }}-linux-armv5

  # ============================
  # mips (big-endian)
  # ============================
  linux-mips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MIPS toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu

      - name: Build po2lmo (mips)
        run: |
          make clean
          make CC=mips-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-mips

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-mips
          path: dist/${{ env.BINARY_NAME }}-linux-mips

  # ============================
  # mipsel (little-endian)
  # ============================
  linux-mipsel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MIPSEL toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: Build po2lmo (mipsel)
        run: |
          make clean
          make CC=mipsel-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-mipsel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-mipsel
          path: dist/${{ env.BINARY_NAME }}-linux-mipsel

  # ============================
  # Windows ARM64 (LLVM-mingw)
  # ============================
  windows-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download LLVM-mingw (ARM64)
        run: |
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/20240619/llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xf llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz
          mv llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64 llvm-mingw

      - name: Build po2lmo (Windows ARM64)
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          make clean
          make CC=aarch64-w64-mingw32-gcc LDFLAGS="-lws2_32"
          mkdir -p dist
          cp po2lmo.exe dist/${BINARY_NAME}-windows-arm64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-arm64.exe
          path: dist/${{ env.BINARY_NAME }}-windows-arm64.exe

  # ============================
  # macOS Intel
  # ============================
  macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build po2lmo (macOS Intel)
        run: |
          make clean
          make CC="clang -target x86_64-apple-macos12"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-macos-intel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-intel
          path: dist/${{ env.BINARY_NAME }}-macos-intel

  # ============================
  # macOS ARM64
  # ============================
  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build po2lmo (macOS ARM64)
        run: |
          make clean
          make CC="clang -target arm64-apple-macos12"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-arm64
          path: dist/${{ env.BINARY_NAME }}-macos-arm64

  # ---- Publish nightly (single workflow, all 23 jobs) ----

  publish-nightly:
    runs-on: ubuntu-24.04
    needs:
      - linux-x86_64
      - linux-i386
      - linux-armv7
      - linux-armhf
      - linux-aarch64
      - linux-riscv64
      - linux-powerpc
      - linux-powerpc64
      - linux-s390x
      - linux-x86_64-musl
      - linux-armhf-musl
      - linux-aarch64-musl
      - macos-universal
      - windows-x86_64
      - windows-i386
      - linux-loongarch64
      - linux-armv6
      - linux-armv5
      - linux-mips
      - linux-mipsel
      - windows-arm64
      - macos-intel
      - macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: List downloaded files
        run: ls -R dist-all

      # ---------------------------------------------------------
      # 方案 A：自动生成 Release 页面短链接表格
      # ---------------------------------------------------------
      - name: Generate Release body
        run: |
          cat > release_body.md << 'EOF'
          ## 📦 Direct Downloads (23 Architectures)

          | Platform | Download |
          |----------|----------|
          | Linux x86_64 | [po2lmo-linux-x86_64](./po2lmo-linux-x86_64) |
          | Linux i386 | [po2lmo-linux-i386](./po2lmo-linux-i386) |
          | Linux armv7 | [po2lmo-linux-armv7](./po2lmo-linux-armv7) |
          | Linux armhf | [po2lmo-linux-armhf](./po2lmo-linux-armhf) |
          | Linux aarch64 | [po2lmo-linux-aarch64](./po2lmo-linux-aarch64) |
          | Linux riscv64 | [po2lmo-linux-riscv64](./po2lmo-linux-riscv64) |
          | Linux powerpc | [po2lmo-linux-powerpc](./po2lmo-linux-powerpc) |
          | Linux powerpc64 | [po2lmo-linux-powerpc64](./po2lmo-linux-powerpc64) |
          | Linux s390x | [po2lmo-linux-s390x](./po2lmo-linux-s390x) |
          | Linux x86_64-musl | [po2lmo-linux-x86_64-musl](./po2lmo-linux-x86_64-musl) |
          | Linux armhf-musl | [po2lmo-linux-armhf-musl](./po2lmo-linux-armhf-musl) |
          | Linux aarch64-musl | [po2lmo-linux-aarch64-musl](./po2lmo-linux-aarch64-musl) |
          | Linux loongarch64 | [po2lmo-linux-loongarch64](./po2lmo-linux-loongarch64) |
          | Linux armv6 | [po2lmo-linux-armv6](./po2lmo-linux-armv6) |
          | Linux armv5 | [po2lmo-linux-armv5](./po2lmo-linux-armv5) |
          | Linux mips | [po2lmo-linux-mips](./po2lmo-linux-mips) |
          | Linux mipsel | [po2lmo-linux-mipsel](./po2lmo-linux-mipsel) |
          | macOS Universal | [po2lmo-macos-universal](./po2lmo-macos-universal) |
          | macOS Intel | [po2lmo-macos-intel](./po2lmo-macos-intel) |
          | macOS ARM64 | [po2lmo-macos-arm64](./po2lmo-macos-arm64) |
          | Windows x86_64 | [po2lmo-windows-x86_64.exe](./po2lmo-windows-x86_64.exe) |
          | Windows i386 | [po2lmo-windows-i386.exe](./po2lmo-windows-i386.exe) |
          | Windows ARM64 | [po2lmo-windows-arm64.exe](./po2lmo-windows-arm64.exe) |
          EOF

      # ---------------------------------------------------------
      # 发布 nightly Release（使用 body_path）
      # ---------------------------------------------------------
      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-build
          name: "po2lmo Multi-OS/Architectures (23) Nightly Build"
          prerelease: true
          files: dist-all/**/*
          overwrite_files: true
          body_path: release_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 方案 C：自动更新 README（完整链接表格）
      # ---------------------------------------------------------
      - name: Update README with latest nightly links
        run: |
          cat > README.md << 'EOF'
          # po2lmo – Multi‑Platform Binary Release

          po2lmo is a lightweight command‑line tool used to convert .po translation files
          into .lmo files for LuCI (OpenWrt’s web interface). This repository provides
          precompiled binaries for 23 different platforms, including Linux (glibc & musl),
          Windows, macOS, ARM SBCs, RISC‑V, IBM Z, and more.

          All binaries are statically compiled where possible and require no external
          dependencies.

          For background details, see: [Why This Project Exists](WHY.md)

          ---

          ## Features

          • Converts .po files into .lmo files for LuCI  
          • Extremely small and fast  
          • No dependencies required  
          • Precompiled for 23 architectures  
          • Works on routers, servers, desktops, SBCs, and embedded devices  

          ---

          See the changelog → [CHANGELOG.md](CHANGELOG.md)

          ---

          ## Quick Start

          1. Download the correct po2lmo binary for your system.  
             Refer to the Version Selection Guide in this repository or on the Release page.

          2. Make the binary executable (Linux / macOS):  

          	chmod +x po2lmo-xxxx


          3. Convert a .po file into a .lmo file:  

          	./po2lmo-xxxx input.po output.lmo


          4. On Windows:  

          	po2lmo-windows-x86_64.exe input.po output.lmo


          5. Use the generated .lmo file inside your LuCI application or OpenWrt package.
          All binaries are self‑contained and require no additional installation.

          ---

          ## Version Selection Guide (Simple and Direct)

          ### Linux (glibc-based: Ubuntu, Debian, CentOS, Fedora, Arch, SUSE, etc.)

          - 64‑bit Linux  
            → po2lmo-linux-x86_64

          - 32‑bit Linux  
            → po2lmo-linux-i386

          - ARMv7 / ARMhf Linux  
            → po2lmo-linux-armhf

          - ARMv7 (hard‑float) / ARM SBCs  
            → po2lmo-linux-armv7

          - ARM64 / AArch64 Linux  
            → po2lmo-linux-aarch64

          - RISC‑V Linux  
            → po2lmo-linux-riscv64

          - PowerPC / PowerPC64 Linux  
            → po2lmo-linux-powerpc  
            → po2lmo-linux-powerpc64

          - IBM Z / s390x Linux  
            → po2lmo-linux-s390x

          ### Linux (musl-based systems, e.g., Alpine Linux)

          - Alpine Linux x86_64  
            → po2lmo-linux-x86_64-musl

          - Alpine Linux ARM64  
            → po2lmo-linux-aarch64-musl

          - Alpine Linux ARMhf  
            → po2lmo-linux-armhf-musl

          ### Windows

          - Windows 10/11 64‑bit  
            → po2lmo-windows-x86_64.exe

          - Windows 32‑bit  
            → po2lmo-windows-i386.exe

          ### macOS

          - Intel Mac + Apple Silicon (Universal Binary)  
            → po2lmo-macos-universal

          Full Version Guide → [VERSION_GUIDE.md](VERSION_GUIDE.md)

          ---

          ## How to Check Your Architecture

          Run:

          \`\`\`
          uname -m
          \`\`\`

          Common outputs:

          x86_64   → po2lmo-linux-x86_64  
          i686     → po2lmo-linux-i386  
          aarch64  → po2lmo-linux-aarch64  
          armv7l   → po2lmo-linux-armv7  
          armhf    → po2lmo-linux-armhf  
          riscv64  → po2lmo-linux-riscv64  
          s390x    → po2lmo-linux-s390x  

          ---

          ## How to Check glibc or musl (Linux)

          Run:

          \`\`\`
          ldd --version
          \`\`\`

          If it shows glibc → download the normal version  
          If it shows musl  → download the *-musl version  

          ---

          ## Build From official Source 

          The source file is available from the official LuCI repository:  
          https://github.com/openwrt/luci

          Compile manually:

          \`\`\`
          gcc -O2 -o po2lmo po2lmo.c
          \`\`\`

