name: Build 15-arch & Release (C po2lmo)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  BINARY_NAME: po2lmo

jobs:

  build-linux-x86_64:
    name: linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-x86_64 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64
          path: dist/${BINARY_NAME}-linux-x86_64

  build-linux-i386:
    name: linux-i386
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          gcc -m32 -O2 -static -s -o dist/${BINARY_NAME}-linux-i386 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386
          path: dist/${BINARY_NAME}-linux-i386

  build-linux-armv7:
    name: linux-armv7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install armv7 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          arm-linux-gnueabihf-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-armv7 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7
          path: dist/${BINARY_NAME}-linux-armv7

  build-linux-armhf:
    name: linux-armhf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install armhf toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          arm-linux-gnueabihf-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-armhf po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf
          path: dist/${BINARY_NAME}-linux-armhf

  build-linux-aarch64:
    name: linux-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          aarch64-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-aarch64 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64
          path: dist/${BINARY_NAME}-linux-aarch64

  build-linux-riscv64:
    name: linux-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install riscv64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          riscv64-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-riscv64 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-riscv64
          path: dist/${BINARY_NAME}-linux-riscv64

  build-linux-powerpc:
    name: linux-powerpc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ppc64le toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc64le-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          powerpc64le-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-powerpc po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc
          path: dist/${BINARY_NAME}-linux-powerpc

  build-linux-powerpc64:
    name: linux-powerpc64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ppc64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc64-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          powerpc64-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-powerpc64 po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc64
          path: dist/${BINARY_NAME}-linux-powerpc64

  build-linux-s390x:
    name: linux-s390x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install s390x toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-s390x-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          s390x-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-s390x po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-s390x
          path: dist/${BINARY_NAME}-linux-s390x

  build-linux-x86_64-musl:
    name: linux-x86_64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-x86_64-musl po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64-musl
          path: dist/${BINARY_NAME}-linux-x86_64-musl

  build-linux-i386-musl:
    name: linux-i386-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          gcc -m32 -O2 -static -s -o dist/${BINARY_NAME}-linux-i386-musl po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386-musl
          path: dist/${BINARY_NAME}-linux-i386-musl

  build-linux-armv7-musl:
    name: linux-armv7-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          arm-linux-gnueabihf-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-armv7-musl po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7-musl
          path: dist/${BINARY_NAME}-linux-armv7-musl

  build-linux-armhf-musl:
    name: linux-armhf-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          arm-linux-gnueabihf-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-armhf-musl po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf-musl
          path: dist/${BINARY_NAME}-linux-armhf-musl

  build-linux-aarch64-musl:
    name: linux-aarch64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: |
          ls -al
          mkdir -p dist
          aarch64-linux-gnu-gcc -O2 -static -s -o dist/${BINARY_NAME}-linux-aarch64-musl po2lmo.c lib/lmo.c
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64-musl
          path: dist/${BINARY_NAME}-linux-aarch64-musl

  build-macos-universal:
    name: macos-universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build amd64
        run: |
          ls -al
          mkdir -p dist
          clang -O2 -o dist/${BINARY_NAME}-darwin-amd64 po2lmo.c lib/lmo.c
      - name: Build arm64
        run: |
          ls -al
          clang -O2 -target arm64-apple-macos11 -o dist/${BINARY_NAME}-darwin-arm64 po2lmo.c lib/lmo.c
      - name: Create universal binary
        run: |
          lipo -create \
            dist/${BINARY_NAME}-darwin-amd64 \
            dist/${BINARY_NAME}-darwin-arm64 \
            -output dist/${BINARY_NAME}-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-universal
          path: dist/${BINARY_NAME}-macos-universal
