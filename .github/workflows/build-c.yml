          make clean
          make CC=powerpc64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc64
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc64
          path: dist/${BINARY_NAME}-linux-powerpc64

  build-linux-s390x:
    name: linux-s390x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install s390x toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-s390x-linux-gnu
      - name: Build
        run: |
          ls -al
          make clean
          make CC=s390x-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-s390x
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-s390x
          path: dist/${BINARY_NAME}-linux-s390x

  build-linux-x86_64-musl:
    name: linux-x86_64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: |
          ls -al
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64-musl
          path: dist/${BINARY_NAME}-linux-x86_64-musl

  build-linux-i386-musl:
    name: linux-i386-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Build
        run: |
          ls -al
          make clean
          make CC="gcc -m32"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-i386-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386-musl
          path: dist/${BINARY_NAME}-linux-i386-musl

  build-linux-armv7-musl:
    name: linux-armv7-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7-musl
          path: dist/${BINARY_NAME}-linux-armv7-musl

  build-linux-armhf-musl:
    name: linux-armhf-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arm toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          ls -al
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf-musl
          path: dist/${BINARY_NAME}-linux-armhf-musl

  build-linux-aarch64-musl:
    name: linux-aarch64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: |
          ls -al
          make clean
          make CC=aarch64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64-musl
          path: dist/${BINARY_NAME}-linux-aarch64-musl

  build-macos-universal:
    name: macos-universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build amd64
        run: |
          ls -al
          make clean
          make CC=clang
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-darwin-amd64
      - name: Build arm64
        run: |
          ls -al
          make clean
          make CC="clang -target arm64-apple-macos11"
          cp po2lmo dist/${BINARY_NAME}-darwin-arm64
      - name: Create universal binary
        run: |
          lipo -create \
            dist/${BINARY_NAME}-darwin-amd64 \
            dist/${BINARY_NAME}-darwin-arm64 \
            -output dist/${BINARY_NAME}-macos-universal
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-universal
          path: dist/${BINARY_NAME}-macos-universal
