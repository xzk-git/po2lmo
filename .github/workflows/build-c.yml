name: build-c

on:
  push:

env:
  BINARY_NAME: po2lmo
  ZIG_VERSION: 0.11.0

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        run: |
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64
          path: dist/${{ env.BINARY_NAME }}-linux-x86_64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-i386:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install i386 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-i686-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=i686-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-i386

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386
          path: dist/${{ env.BINARY_NAME }}-linux-i386
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armv7:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install armv7 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7
          path: dist/${{ env.BINARY_NAME }}-linux-armv7
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armhf:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install armhf cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf
          path: dist/${{ env.BINARY_NAME }}-linux-armhf
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install aarch64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=aarch64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64
          path: dist/${{ env.BINARY_NAME }}-linux-aarch64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-riscv64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install riscv64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=riscv64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-riscv64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-riscv64
          path: dist/${{ env.BINARY_NAME }}-linux-riscv64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-powerpc:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install powerpc cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=powerpc-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc
          path: dist/${{ env.BINARY_NAME }}-linux-powerpc
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-powerpc64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install powerpc64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc64-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=powerpc64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc64
          path: dist/${{ env.BINARY_NAME }}-linux-powerpc64
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-s390x:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install s390x cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-s390x-linux-gnu

      - name: Build
        run: |
          make clean
          make CC=s390x-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-s390x

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-s390x
          path: dist/${{ env.BINARY_NAME }}-linux-s390x
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-x86_64-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (musl, x86_64)
        run: |
          make clean
          make CC="zig cc -target x86_64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64-musl
          path: dist/${{ env.BINARY_NAME }}-linux-x86_64-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armv7-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (musl, armv7)
        run: |
          make clean
          make CC="zig cc -target armv7-linux-musleabihf"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7-musl
          path: dist/${{ env.BINARY_NAME }}-linux-armv7-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-armhf-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (musl, armhf)
        run: |
          make clean
          make CC="zig cc -target arm-linux-musleabihf"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf-musl
          path: dist/${{ env.BINARY_NAME }}-linux-armhf-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  linux-aarch64-musl:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          ZIG_VERSION: ${{ env.ZIG_VERSION }}

      - name: Install Zig
        run: |
          curl -L -o zig.tar.xz https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz
          tar xf zig.tar.xz
          echo "$(pwd)/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Build (musl, aarch64)
        run: |
          make clean
          make CC="zig cc -target aarch64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64-musl
          path: dist/${{ env.BINARY_NAME }}-linux-aarch64-musl
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  macos-universal:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (universal)
        run: |
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-universal
          path: dist/${{ env.BINARY_NAME }}-macos-universal
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  windows-x86_64:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Build
        shell: msys2 {0}
        run: |
          make clean
          make CC=x86_64-w64-mingw32-gcc
          mkdir -p dist
          cp po2lmo.exe dist/${BINARY_NAME}-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-x86_64
          path: dist/${{ env.BINARY_NAME }}-windows-x86_64.exe
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  windows-i386:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-i686-gcc
            make

      - name: Build
        shell: msys2 {0}
        run: |
          make clean
          make CC=i686-w64-mingw32-gcc
          mkdir -p dist
          cp po2lmo.exe dist/${BINARY_NAME}-windows-i386.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-i386
          path: dist/${{ env.BINARY_NAME }}-windows-i386.exe
          if-no-files-found: warn
          compression-level: 6
          overwrite: false

  publish-nightly:
    runs-on: ubuntu-24.04
    needs:
      - linux-x86_64
      - linux-i386
      - linux-armv7
      - linux-armhf
      - linux-aarch64
      - linux-riscv64
      - linux-powerpc
      - linux-powerpc64
      - linux-s390x
      - linux-x86_64-musl
      - linux-armv7-musl
      - linux-armhf-musl
      - linux-aarch64-musl
      - macos-universal
      - windows-x86_64
      - windows-i386
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 这里保留你原来的发布逻辑；如果只是 nightly artifact 汇总，可以在这里下载并处理
      - name: Done
        run: echo "Nightly build completed."
