name: Build 17-arch & Release (C po2lmo)
permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  BINARY_NAME: po2lmo

jobs:

  # -------------------------
  # Linux glibc 架构（使用 gcc）
  # -------------------------

  build-linux-x86_64:
    name: linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Build
        run: |
          make clean
          make
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64
          path: dist/${BINARY_NAME}-linux-x86_64

  build-linux-i386:
    name: linux-i386
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - name: Build
        run: |
          make clean
          make CC="gcc -m32"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-i386
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386
          path: dist/${BINARY_NAME}-linux-i386

  build-linux-armv7:
    name: linux-armv7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install armv7 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7
          path: dist/${BINARY_NAME}-linux-armv7

  build-linux-armhf:
    name: linux-armhf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install armhf toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        run: |
          make clean
          make CC=arm-linux-gnueabihf-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf
          path: dist/${BINARY_NAME}-linux-armhf

  build-linux-aarch64:
    name: linux-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install aarch64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: |
          make clean
          make CC=aarch64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64
          path: dist/${BINARY_NAME}-linux-aarch64

  build-linux-riscv64:
    name: linux-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install riscv64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-riscv64-linux-gnu
      - name: Build
        run: |
          make clean
          make CC=riscv64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-riscv64
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-riscv64
          path: dist/${BINARY_NAME}-linux-riscv64

  build-linux-powerpc:
    name: linux-powerpc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ppc64le toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc64le-linux-gnu
      - name: Build
        run: |
          make clean
          make CC=powerpc64le-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc
          path: dist/${BINARY_NAME}-linux-powerpc

  build-linux-powerpc64:
    name: linux-powerpc64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ppc64 toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-powerpc64-linux-gnu
      - name: Build
        run: |
          make clean
          make CC=powerpc64-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-powerpc64
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-powerpc64
          path: dist/${BINARY_NAME}-linux-powerpc64

  build-linux-s390x:
    name: linux-s390x
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install s390x toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-s390x-linux-gnu
      - name: Build
        run: |
          make clean
          make CC=s390x-linux-gnu-gcc
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-s390x
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-s390x
          path: dist/${BINARY_NAME}-linux-s390x

  # -------------------------
  # Linux musl 架构（使用 Zig CC）
  # -------------------------

  build-linux-x86_64-musl:
    name: linux-x86_64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Build (musl)
        run: |
          make clean
          make CC="zig cc -target x86_64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-x86_64-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64-musl
          path: dist/${BINARY_NAME}-linux-x86_64-musl

  build-linux-i386-musl:
    name: linux-i386-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Build (musl)
        run: |
          make clean
          make CC="zig cc -target i386-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-i386-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-i386-musl
          path: dist/${BINARY_NAME}-linux-i386-musl

  build-linux-armv7-musl:
    name: linux-armv7-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Build (musl)
        run: |
          make clean
          make CC="zig cc -target arm-linux-musleabihf"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armv7-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv7-musl
          path: dist/${BINARY_NAME}-linux-armv7-musl

  build-linux-armhf-musl:
    name: linux-armhf-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Build (musl)
        run: |
          make clean
          make CC="zig cc -target arm-linux-musleabihf"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-armhf-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armhf-musl
          path: dist/${BINARY_NAME}-linux-armhf-musl

  build-linux-aarch64-musl:
    name: linux-aarch64-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Build (musl)
        run: |
          make clean
          make CC="zig cc -target aarch64-linux-musl"
          mkdir -p dist
          cp po2lmo dist/${BINARY_NAME}-linux-aarch64-musl
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-aarch64-musl
          path: dist/${BINARY_NAME}-linux-aarch64-musl

  # -------------------------
  # macOS universal
  # -------------------------

  build-macos-universal:
    name: macos-universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          make clean
          make CC="clang -target x86_64-apple-macos11"
          mkdir -p dist
          cp po2lmo dist/po2lmo-darwin-amd64

      - name: Build arm64
        run: |
          make clean
          make CC="clang -target arm64-apple-macos11"
          mkdir -p dist
          cp po2lmo dist/po2lmo-darwin-arm64

      - name: Create universal binary
        run: |
          lipo -create \
            dist/po2lmo-darwin-amd64 \
            dist/po2lmo-darwin-arm64 \
            -output dist/po2lmo-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-universal
          path: dist/po2lmo-macos-universal

  # -------------------------
  # Windows
  # -------------------------

  build-windows-x86_64:
    name: windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64 toolchain
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build Windows x86_64
        run: |
          make clean
          make CC=x86_64-w64-mingw32-gcc LDFLAGS="-lws2_32"
          mkdir -p dist
          cp po2lmo.exe dist/po2lmo-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-x86_64
          path: dist/po2lmo-windows-x86_64.exe

  build-windows-i386:
    name: windows-i386
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64 toolchain
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build Windows i386
        run: |
          make clean
          make CC=i686-w64-mingw32-gcc LDFLAGS="-lws2_32"
          mkdir -p dist
          cp po2lmo.exe dist/po2lmo-windows-i386.exe
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-i386
          path: dist/po2lmo-windows-i386.exe

  # -------------------------
  # Release
  # -------------------------

  release-nightly:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-x86_64
      - build-linux-i386
      - build-linux-armv7
      - build-linux-armhf
      - build-linux-aarch64
      - build-linux-riscv64
      - build-linux-powerpc
      - build-linux-powerpc64
      - build-linux-s390x
      - build-linux-x86_64-musl
      - build-linux-i386-musl
      - build-linux-armv7-musl
      - build-linux-armhf-musl
      - build-linux-aarch64-musl
      - build-macos-universal
      - build-windows-x86_64
      - build-windows-i386

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            This is the latest nightly build of **po2lmo**.
            It is automatically updated on every push to main.
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
