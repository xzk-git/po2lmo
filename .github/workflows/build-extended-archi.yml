name: Build Extended Architectures

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # ============================
  # loongarch64 (Loongson 官方工具链)
  # ============================
  build-loongarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget gawk bison flex texinfo

      - name: Cache musl-cross-make toolchain
        uses: actions/cache@v3
        with:
          path: loong-mcm
          key: loongarch64-musl-toolchain

      - name: Build musl-cross-make (loongarch64)
        run: |
          if [ ! -d loong-mcm ]; then
            git clone https://github.com/loongson/musl-cross-make.git loong-mcm
          fi
          cd loong-mcm
          echo "TARGET = loongarch64-linux-musl" > config.mak
          echo "OUTPUT = /usr/local/musl" >> config.mak
          make -j$(nproc)
          sudo make install

      - name: Build po2lmo (loongarch64)
        run: |
          export PATH="/usr/local/musl/bin:$PATH"
          make clean
          make CC=loongarch64-linux-musl-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-loongarch64
          path: po2lmo

  # ============================
  # armv6
  # ============================
  build-armv6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi

      - name: Build po2lmo (armv6)
        run: |
          make clean
          make CC=arm-linux-gnueabi-gcc CFLAGS="-O2 -march=armv6"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv6
          path: po2lmo

  # ============================
  # armv5
  # ============================
  build-armv5:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabi

      - name: Build po2lmo (armv5)
        run: |
          make clean
          make CC=arm-linux-gnueabi-gcc CFLAGS="-O2 -march=armv5te"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-armv5
          path: po2lmo

  # ============================
  # mips (big-endian)
  # ============================
  build-mips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MIPS toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu

      - name: Build po2lmo (mips)
        run: |
          make clean
          make CC=mips-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-mips
          path: po2lmo

  # ============================
  # mipsel (little-endian)
  # ============================
  build-mipsel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MIPSEL toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu

      - name: Build po2lmo (mipsel)
        run: |
          make clean
          make CC=mipsel-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-mipsel
          path: po2lmo

  # ============================
  # Windows ARM64 (clang 交叉编译)
  # ============================
  build-windows-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download LLVM-mingw (ARM64)
        run: |
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/20240619/llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xf llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz
          mv llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64 llvm-mingw

      - name: Build po2lmo (Windows ARM64)
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          make clean
          make CC=aarch64-w64-mingw32-gcc LDFLAGS="-lws2_32"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-windows-arm64.exe
          path: po2lmo.exe

  # ============================
  # macOS Intel-only
  # ============================
  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build po2lmo (macOS Intel x86_64)
        run: |
          make clean
          make CC="clang -target x86_64-apple-macos12"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-x86_64
          path: po2lmo

  # ============================
  # macOS ARM-only
  # ============================
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build po2lmo (macOS ARM64)
        run: |
          make clean
          make CC="clang -target arm64-apple-macos12"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: po2lmo-macos-arm64
          path: po2lmo
