name: Build 15-arch & Release (Go Type 1)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  BINARY_NAME: po2lmo

jobs:
  build-linux-x86_64:
    name: linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/${BINARY_NAME}-linux-x86_64 .
      - uses: actions/upload-artifact@v4
        with:
          name: po2lmo-linux-x86_64
          path: dist/${BINARY_NAME}-linux-x86_64
